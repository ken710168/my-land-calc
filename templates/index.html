<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>土地補償金精算機 - 多檔案同步版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --bg: #f8fafc; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: #1e293b; padding: 2rem 1rem; }
        .card { max-width: 850px; margin: auto; background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; font-size: 1.8rem; margin-bottom: 2rem; color: #0f172a; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-bottom: 1rem; }
        label { display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.9rem; }
        select, input { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; font-size: 1rem; }
        .btn { padding: 0.8rem; border-radius: 0.5rem; border: none; cursor: pointer; font-weight: 700; transition: 0.2s; width: 100%; }
        .btn-p { background: var(--primary); color: white; margin-top: 1rem; }
        .btn-s { background: var(--secondary); color: white; margin-top: 1.5rem; }
        .result-box { background: #0f172a; color: #10b981; padding: 1.5rem; border-radius: 0.75rem; text-align: center; margin-top: 2rem; }
        .amount { font-family: 'JetBrains Mono'; font-size: 2.2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
        th, td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; }
    </style>
</head>
<body>
    <div class="card">
        <h1>土地使用補償金精算機</h1>
        
        <div class="form-row">
            <div><label>縣市</label><select id="city"><option value="新北市">新北市</option><option value="基隆市">基隆市</option></select></div>
            <div><label>行政區</label><select id="district"></select></div>
        </div>

        <div class="form-row">
            <div><label>段名 (母地段)</label><select id="section" disabled><option value="">請先選擇行政區</option></select></div>
            <div><label>小段 (子地段)</label><select id="subSection" disabled><option value="">無小段</option></select></div>
        </div>

        <div class="form-row">
            <div>
                <label>地號 (母-子)</label>
                <div style="display: flex; gap: 5px; align-items: center;">
                    <input type="text" id="lMain" placeholder="0000" maxlength="4">
                    <span>-</span>
                    <input type="text" id="lSub" placeholder="0000" maxlength="4">
                </div>
            </div>
            <div><label>計算面積 (m²)</label><input type="number" id="area" step="0.01" placeholder="讀取後自動填入"></div>
        </div>

        <div class="form-row">
            <div><label>起日 (選填: 1100101)</label><input type="text" id="sDate"></div>
            <div><label>迄日 (必填: 1150101)</label><input type="text" id="eDate"></div>
        </div>

        <button class="btn btn-p" onclick="fetchData()" id="btnF">1. 讀取公告地價與面積</button>

        <div id="priceZone" style="display:none; margin-top:2rem;">
            <label>💰 公告地價確認 (可手動修改)</label>
            <table id="pTable"><thead><tr><th>年份</th><th>地價 (元/m²)</th></tr></thead><tbody></tbody></table>
            <button class="btn btn-s" onclick="calculate()">2. 執行分段計算</button>
        </div>

        <div id="resZone" style="display:none;">
            <div class="result-box">
                <div style="font-size: 0.9rem; color: #94a3b8;">總補償金 (無條件進位)</div>
                <div class="amount" id="finalAmt">NT$ 0</div>
            </div>
            <table id="dTable"><thead><tr><th>區間</th><th>天數</th><th>小計</th></tr></thead><tbody></tbody></table>
        </div>
    </div>

    <script>
        const DISTS = {"新北市": ["淡水區", "三芝區", "石門區", "金山區", "萬里區", "瑞芳區", "平溪區", "雙溪區", "貢寮區"], "基隆市": ["七堵區"]};
        let yearsData = [];

        function init() {
            const city = document.getElementById('city').value;
            document.getElementById('district').innerHTML = DISTS[city].map(d => `<option value="${d}">${d}</option>`).join('');
            loadSec();
        }

        async function loadSec() {
            const city = document.getElementById('city').value, dist = document.getElementById('district').value;
            const s = document.getElementById('section'); s.disabled = true; s.innerHTML = '<option>讀取中...</option>';
            try {
                const r = await fetch('/api/get_sections', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({city, district:dist})});
                const d = await r.json();
                s.innerHTML = d.sections.length ? d.sections.map(v => `<option value="${v}">${v}</option>`).join('') : '<option value="">查無地段</option>';
                s.disabled = false;
            } catch(e) { s.innerHTML = '<option>連線錯誤</option>'; }
        }

        async function fetchData() {
            const btn = document.getElementById('btnF'); btn.innerText = "讀取中..."; btn.disabled = true;
            const payload = {
                city: document.getElementById('city').value,
                district: document.getElementById('district').value,
                section: document.getElementById('section').value,
                subSection: document.getElementById('subSection').value,
                landNumber: document.getElementById('lMain').value.padStart(4,'0') + document.getElementById('lSub').value.padStart(4,'0')
            };
            try {
                const r = await fetch('/api/get_calc_data', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
                const d = await r.json();
                if(d.error) return alert(d.error);
                document.getElementById('area').value = d.area || '';
                yearsData = d.yearsData;
                document.querySelector('#pTable tbody').innerHTML = yearsData.map(y => `<tr><td>${y.year}年</td><td><input type="number" class="p-edit" data-y="${y.year}" value="${y.price}"></td></tr>`).join('');
                document.getElementById('priceZone').style.display = 'block';
            } catch(e) { alert("讀取失敗"); } finally { btn.innerText = "1. 讀取公告地價與面積"; btn.disabled = false; }
        }

        function calculate() {
            // 更新手動調整的地價
            document.querySelectorAll('.p-edit').forEach(el => {
                const target = yearsData.find(y => y.year == el.dataset.y);
                if(target) target.price = parseFloat(el.value) || 0;
            });

            const area = parseFloat(document.getElementById('area').value), eStr = document.getElementById('eDate').value;
            let sStr = document.getElementById('sDate').value;
            
            const end = parseROC(eStr); if(!end) return alert("請填寫正確的迄日");
            let start = parseROC(sStr);
            if(!start) { start = new Date(end); start.setFullYear(start.getFullYear()-5); start.setDate(start.getDate()+1); }
            
            let total = 0, tempS = new Date(start);
            const tbody = document.querySelector('#dTable tbody'); tbody.innerHTML = '';

            while(tempS <= end) {
                const curY = tempS.getFullYear(), yEnd = new Date(curY, 11, 31);
                const segE = yEnd < end ? yEnd : end;
                const days = Math.floor((segE - tempS)/(86400000)) + 1;
                const rocY = curY - 1911;

                // 核心邏輯：偶數年抓前一年地價
                let lookY = (rocY % 2 === 0) ? (rocY - 1) : rocY;
                const data = yearsData.find(y => y.year <= lookY);
                const price = data ? data.price : 0;

                const subTotal = Math.ceil(price * area * 0.05 * (days / 365));
                total += subTotal;

                tbody.innerHTML += `<tr><td>${rocY}年 (${fmt(tempS)}~${fmt(segE)})<br><small>適用${data ? data.year : '?' }年價</small></td><td>${days}天</td><td>${subTotal.toLocaleString()}</td></tr>`;
                tempS = new Date(segE); tempS.setDate(tempS.getDate() + 1);
            }

            document.getElementById('finalAmt').innerText = `NT$ ${total.toLocaleString()}`;
            document.getElementById('resZone').style.display = 'block';
            window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
        }

        function parseROC(s) {
            if(!s || s.length < 6) return null;
            const y = parseInt(s.slice(0,-4)) + 1911, m = parseInt(s.slice(-4,-2)) - 1, d = parseInt(s.slice(-2));
            return new Date(y,m,d);
        }
        function fmt(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
        document.getElementById('city').onchange = init;
        document.getElementById('district').onchange = loadSec;
        window.onload = init;
    </script>
</body>
</html>
